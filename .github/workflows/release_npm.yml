name: Release npm

on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Build and publish npm wrapper
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Generate and build npm wrapper
        run: bun run scripts/release_npm.ts

      - name: Publish to npm
        # npm v11.5.1+ supports OIDC trusted publishing natively — no token needed.
        # Provenance is included automatically when using OIDC.
        run: npm publish .release/npm --access public
